<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>재물조사 시스템</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e2e0d8;
    --text: #1a1916;
    --text2: #6b6960;
    --text3: #a8a69e;
    --accent: #2c5f8a;
    --accent-light: #e8f0f7;
    --success: #1a6b3a;
    --success-light: #e6f4ec;
    --danger: #8a2c2c;
    --danger-light: #f7e8e8;
    --warning: #7a5c1a;
    --warning-light: #fdf3e0;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

  /* 로그인 */
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
  .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 360px; }
  .login-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
  .login-sub { font-size: 13px; color: var(--text2); margin-bottom: 2rem; }
  .role-select { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.5rem; }
  .role-btn { padding: 12px; border: 1.5px solid var(--border); border-radius: var(--radius); background: var(--surface); cursor: pointer; text-align: center; font-size: 13px; color: var(--text2); transition: all .15s; }
  .role-btn.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); font-weight: 600; }
  .role-icon { font-size: 24px; display: block; margin-bottom: 4px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; font-weight: 500; }
  .field input, .field select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; background: var(--surface); color: var(--text); outline: none; transition: border .15s; }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .btn-full { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
  .btn-full:hover { opacity: .88; }

  /* 메인 앱 */
  #app { display: none; min-height: 100vh; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .app-title { font-size: 15px; font-weight: 700; color: var(--text); }
  .user-badge { font-size: 12px; padding: 3px 10px; border-radius: 20px; background: var(--accent-light); color: var(--accent); font-weight: 600; }
  .logout-btn { font-size: 12px; color: var(--text3); cursor: pointer; padding: 4px 8px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: none; }

  /* 탭 */
  .tab-bar { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; }
  .tab { padding: 12px 18px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--text2); white-space: nowrap; border-bottom: 2px solid transparent; transition: all .15s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .screen { display: none; padding: 16px; max-width: 720px; margin: 0 auto; }
  .screen.active { display: block; }

  /* 카드 */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .card-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text); display: flex; align-items: center; gap: 6px; }

  /* 통계 */
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 12px; text-align: center; }
  .stat-num { font-size: 26px; font-weight: 700; }
  .stat-lbl { font-size: 11px; color: var(--text2); margin-top: 2px; }

  /* 진행바 */
  .prog-wrap { background: var(--bg); border-radius: 20px; height: 8px; overflow: hidden; }
  .prog-bar { height: 8px; border-radius: 20px; background: var(--success); transition: width .5s ease; }

  /* 배지 */
  .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-ok { background: var(--success-light); color: var(--success); }
  .badge-no { background: var(--bg); color: var(--text2); border: 1px solid var(--border); }
  .badge-dept { background: var(--accent-light); color: var(--accent); }

  /* 자산 행 */
  .asset-item { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 1px solid var(--border); }
  .asset-item:last-child { border-bottom: none; }
  .asset-check { font-size: 20px; flex-shrink: 0; }
  .asset-info { flex: 1; min-width: 0; }
  .asset-id { font-size: 12px; color: var(--text2); }
  .asset-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .asset-loc { font-size: 11px; color: var(--text3); }
  .asset-meta { text-align: right; flex-shrink: 0; }

  /* QR 스캔 */
  .qr-area { border: 2px dashed var(--border); border-radius: var(--radius); padding: 28px 16px; text-align: center; cursor: pointer; transition: all .15s; margin-bottom: 12px; }
  .qr-area:hover { border-color: var(--accent); background: var(--accent-light); }
  .qr-icon { font-size: 52px; margin-bottom: 8px; }
  .qr-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .qr-hint { font-size: 12px; color: var(--text2); }

  /* 알림 */
  .alert { padding: 12px 14px; border-radius: var(--radius-sm); margin-bottom: 12px; font-size: 13px; display: none; }
  .alert-ok { background: var(--success-light); color: var(--success); border: 1px solid #b8dfc9; }
  .alert-fail { background: var(--danger-light); color: var(--danger); border: 1px solid #dfc8c8; }
  .alert-warn { background: var(--warning-light); color: var(--warning); border: 1px solid #e8d9aa; }

  /* 입력 */
  .row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .row label { font-size: 12px; color: var(--text2); min-width: 58px; font-weight: 500; }
  .row input, .row select { flex: 1; padding: 9px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; background: var(--surface); color: var(--text); outline: none; }
  .row input:focus, .row select:focus { border-color: var(--accent); }

  .btn { padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-outline { background: none; border: 1px solid var(--border); color: var(--text); }
  .btn-danger { background: none; border: 1px solid #dfc8c8; color: var(--danger); font-size: 12px; padding: 5px 10px; }

  .flex-end { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }

  /* 부서 그리드 */
  .dept-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
  .dept-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 12px; cursor: pointer; text-align: center; transition: all .15s; }
  .dept-card:hover { border-color: var(--accent); background: var(--accent-light); }
  .dept-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .dept-stat { font-size: 12px; color: var(--text2); }

  .back-btn { display: flex; align-items: center; gap: 4px; font-size: 13px; color: var(--text2); cursor: pointer; background: none; border: none; margin-bottom: 12px; padding: 0; }
  .back-btn:hover { color: var(--text); }

  /* 검색 */
  .search-wrap { position: relative; margin-bottom: 12px; }
  .search-wrap input { width: 100%; padding: 10px 12px 10px 36px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; outline: none; background: var(--surface); }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 15px; color: var(--text3); }

  /* 조사 로그 */
  .log-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .log-item:last-child { border-bottom: none; }
  .log-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .log-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* 태그 */
  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .tag { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; background: var(--accent-light); color: var(--accent); border-radius: 20px; font-size: 12px; font-weight: 500; }
  .tag-x { cursor: pointer; opacity: .6; font-size: 14px; line-height: 1; }
  .tag-x:hover { opacity: 1; }

  /* 업로드 */
  .upload-box { border: 2px dashed var(--border); border-radius: var(--radius); padding: 20px; text-align: center; cursor: pointer; transition: all .15s; margin-bottom: 10px; }
  .upload-box:hover { border-color: var(--accent); background: var(--accent-light); }
  .upload-icon { font-size: 28px; margin-bottom: 6px; }

  .section-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin: 14px 0 8px; }

  .empty { text-align: center; padding: 28px; color: var(--text3); font-size: 13px; }

  /* 실시간 표시 */
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); display: inline-block; margin-right: 4px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* 조사원 이름 표시 */
  .checked-by { font-size: 11px; color: var(--text3); }

  @media (max-width: 480px) {
    .stat-num { font-size: 20px; }
    .dept-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-title">📋 재물조사 시스템</div>
    <div class="login-sub">역할을 선택하고 이름을 입력해주세요</div>
    <div class="role-select">
      <button class="role-btn active" onclick="selectRole('admin', this)">
        <span class="role-icon">🛠️</span>관리자
      </button>
      <button class="role-btn" onclick="selectRole('surveyor', this)">
        <span class="role-icon">🔍</span>조사원
      </button>
    </div>
    <div class="field">
      <label>이름</label>
      <input id="login-name" type="text" placeholder="예: 홍길동" maxlength="20">
    </div>
    <button class="btn-full" onclick="login()">시작하기</button>
    <div id="login-err" style="margin-top:10px;font-size:12px;color:var(--danger);text-align:center;display:none"></div>
  </div>
</div>

<!-- 메인 앱 -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="app-title">📋 재물조사</div>
      <span class="user-badge" id="user-badge"></span>
    </div>
    <button class="logout-btn" onclick="logout()">로그아웃</button>
  </div>

  <!-- 관리자 탭 -->
  <div id="admin-tabs" class="tab-bar" style="display:none">
    <button class="tab active" onclick="switchTab('admin','dept')">부서 관리</button>
    <button class="tab" onclick="switchTab('admin','asset')">자산 관리</button>
    <button class="tab" onclick="switchTab('admin','log')">조사 현황</button>
  </div>

  <!-- 조사원 탭 -->
  <div id="surveyor-tabs" class="tab-bar" style="display:none">
    <button class="tab active" onclick="switchTab('surveyor','scan')">QR 스캔</button>
    <button class="tab" onclick="switchTab('surveyor','list')">물품 목록</button>
  </div>

  <!-- 관리자: 부서 관리 -->
  <div id="screen-dept" class="screen active">
    <div class="card">
      <div class="card-title">🏢 부서 목록</div>
      <div id="dept-tags" class="tag-list"></div>
      <div class="row">
        <input id="new-dept-input" placeholder="새 부서명 입력" style="flex:1;padding:9px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;outline:none;">
        <button class="btn btn-primary" onclick="addDept()">추가</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📊 부서별 조사 현황</div>
      <div id="dept-summary"></div>
    </div>
  </div>

  <!-- 관리자: 자산 관리 -->
  <div id="screen-asset" class="screen">
    <div class="card">
      <div class="card-title">📤 자산 업로드</div>
      <div class="row">
        <label>부서 선택</label>
        <select id="upload-dept-sel"></select>
      </div>
      <div class="upload-box" onclick="document.getElementById('csv-file').click()">
        <div class="upload-icon">📄</div>
        <div style="font-size:13px;font-weight:500;margin-bottom:4px">CSV 파일 업로드</div>
        <div style="font-size:12px;color:var(--text2)">자산번호, 품목명, 위치, 금액, 부서, 등재일자 순서</div>
      </div>
      <input type="file" id="csv-file" accept=".csv" style="display:none" onchange="uploadCSV(event)">
      <div id="upload-result"></div>

      <div class="section-label">직접 입력</div>
      <div class="row"><label>자산번호</label><input id="m-id" placeholder="A-12345"></div>
      <div class="row"><label>품목명</label><input id="m-name" placeholder="노트북"></div>
      <div class="row"><label>위치</label><input id="m-loc" placeholder="101호"></div>
      <div class="row"><label>금액</label><input id="m-price" type="number" placeholder="1500000"></div>
      <div class="row"><label>부서</label><select id="m-dept-sel"></select></div>
      <div class="row"><label>등재일자</label><input id="m-date" type="date"></div>
      <div class="flex-end"><button class="btn btn-primary" onclick="addAsset()">추가</button></div>
    </div>

    <div class="card">
      <div class="card-title">📋 등록 자산 목록</div>
      <div class="row">
        <label>부서 필터</label>
        <select id="asset-filter" onchange="renderAssetList()"></select>
      </div>
      <div id="asset-list"></div>
    </div>
  </div>

  <!-- 관리자: 조사 현황 -->
  <div id="screen-log" class="screen">
    <div class="stat-grid" id="report-stats"></div>

    <div class="card">
      <div class="card-title"><span class="live-dot"></span>실시간 조사 현황</div>
      <div id="log-list"></div>
    </div>
  </div>

  <!-- 조사원: QR 스캔 -->
  <div id="screen-scan" class="screen">
    <div id="sv-dept-sel">
      <div class="card-title" style="margin-bottom:10px">🏢 담당 부서 선택</div>
      <div id="sv-dept-grid" class="dept-grid"></div>
    </div>

    <div id="sv-scan-main" style="display:none">
      <button class="back-btn" onclick="backToDept()">← 부서 선택</button>

      <div class="card">
        <div class="card-title" id="sv-dept-title"></div>
        <div class="prog-wrap" style="margin-bottom:6px"><div class="prog-bar" id="sv-prog-bar"></div></div>
        <div id="sv-prog-label" style="font-size:12px;color:var(--text2)"></div>
      </div>

      <div class="alert alert-ok" id="alert-ok"></div>
      <div class="alert alert-fail" id="alert-fail"></div>
      <div class="alert alert-warn" id="alert-warn"></div>

      <div class="card">
        <div id="qr-start-area" class="qr-area" onclick="startScan()">
          <div class="qr-icon">📷</div>
          <div class="qr-title">QR 코드 스캔 시작</div>
          <div class="qr-hint">탭하면 카메라가 열립니다</div>
        </div>
        <div id="qr-scanner-wrap" style="display:none">
          <video id="qr-video" style="width:100%;border-radius:var(--radius);background:#000;max-height:280px;object-fit:cover"></video>
          <div style="text-align:center;margin-top:10px">
            <button class="btn btn-outline" onclick="stopScan()">스캔 중지</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 조사원: 물품 목록 -->
  <div id="screen-list" class="screen">
    <div id="list-no-dept" class="empty">먼저 QR 스캔 탭에서 부서를 선택해주세요</div>
    <div id="list-main" style="display:none">
      <div class="card">
        <div class="card-title" id="list-dept-title"></div>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input placeholder="품목명 또는 자산번호 검색" oninput="renderSvList(this.value)">
        </div>
        <div id="sv-list"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
const SUPABASE_URL = 'https://guhecafpwakaamanholw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1aGVjYWZwd2FrYWFtYW5ob2x3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMzg1ODMsImV4cCI6MjA5NDkxNDU4M30.rGANFCfg5s9w7Eo2V3s0-KKQewei_rvuHD5qlXeDh84';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentRole = 'admin';
let currentDept = null;
let realtimeSub = null;

// ── 로그인 ──────────────────────────────────────
function selectRole(role, btn) {
  currentRole = role;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function login() {
  const name = document.getElementById('login-name').value.trim();
  if (!name) { showLoginErr('이름을 입력해주세요'); return; }
  currentUser = { name, role: currentRole };
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-badge').textContent = (currentRole === 'admin' ? '관리자' : '조사원') + ' · ' + name;
  if (currentRole === 'admin') {
    document.getElementById('admin-tabs').style.display = 'flex';
    switchTab('admin', 'dept');
  } else {
    document.getElementById('surveyor-tabs').style.display = 'flex';
    switchTab('surveyor', 'scan');
  }
  startRealtime();
}

function logout() {
  if (realtimeSub) db.removeChannel(realtimeSub);
  currentUser = null; currentDept = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('admin-tabs').style.display = 'none';
  document.getElementById('surveyor-tabs').style.display = 'none';
  document.getElementById('login-name').value = '';
}

function showLoginErr(msg) {
  const el = document.getElementById('login-err');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

// ── 탭 전환 ─────────────────────────────────────
function switchTab(role, tab) {
  const tabs = document.querySelectorAll(`#${role}-tabs .tab`);
  const screens = {
    admin: ['dept','asset','log'],
    surveyor: ['scan','list']
  };
  screens[role].forEach((s, i) => {
    const el = document.getElementById('screen-'+s);
    if (el) el.classList.remove('active');
    if (tabs[i]) tabs[i].classList.remove('active');
  });
  const idx = screens[role].indexOf(tab);
  if (tabs[idx]) tabs[idx].classList.add('active');
  const scr = document.getElementById('screen-'+tab);
  if (scr) scr.classList.add('active');

  if (tab === 'dept') { loadDepts(); loadDeptSummary(); }
  if (tab === 'asset') { loadDepts(); loadAssets(); }
  if (tab === 'log') { loadReport(); loadLog(); }
  if (tab === 'scan') { loadSvDepts(); if (currentDept) updateProgress(); }
  if (tab === 'list') {
    if (currentDept) { loadSvList(''); document.getElementById('list-no-dept').style.display='none'; document.getElementById('list-main').style.display='block'; document.getElementById('list-dept-title').textContent = currentDept + ' 물품 목록'; }
    else { document.getElementById('list-no-dept').style.display='block'; document.getElementById('list-main').style.display='none'; }
  }
}

// ── 실시간 구독 ──────────────────────────────────
function startRealtime() {
  realtimeSub = db.channel('assets-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'assets' }, () => {
      const activeTab = document.querySelector('.tab.active');
      if (!activeTab) return;
      if (currentRole === 'admin') {
        loadDeptSummary(); loadReport(); loadLog();
        const assetScr = document.getElementById('screen-asset');
        if (assetScr && assetScr.classList.contains('active')) loadAssets();
      } else {
        if (currentDept) { updateProgress(); loadSvList(''); }
        loadSvDepts();
      }
    })
    .subscribe();
}

// ── 부서 관리 ─────────────────────────────────────
async function loadDepts() {
  const { data } = await db.from('departments').select('*').order('id');
  const depts = data || [];

  // 태그
  const tagEl = document.getElementById('dept-tags');
  if (tagEl) tagEl.innerHTML = depts.length ? depts.map(d =>
    `<span class="tag">${d.name}<span class="tag-x" onclick="removeDept(${d.id},'${d.name}')">×</span></span>`
  ).join('') : '<span style="font-size:13px;color:var(--text3)">등록된 부서가 없습니다</span>';

  // 셀렉트 업데이트
  ['upload-dept-sel','asset-filter','m-dept-sel'].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    const cur = sel.value;
    if (id === 'asset-filter') sel.innerHTML = '<option value="">전체 부서</option>' + depts.map(d=>`<option>${d.name}</option>`).join('');
    else sel.innerHTML = depts.map(d=>`<option>${d.name}</option>`).join('');
    sel.value = cur;
  });
}

async function addDept() {
  const inp = document.getElementById('new-dept-input');
  const name = inp.value.trim();
  if (!name) return;
  const { error } = await db.from('departments').insert({ name });
  if (!error) { inp.value = ''; loadDepts(); }
}

async function removeDept(id, name) {
  if (!confirm(`'${name}' 부서를 삭제할까요?`)) return;
  await db.from('assets').delete().eq('department', name);
  await db.from('departments').delete().eq('id', id);
  loadDepts(); loadDeptSummary();
}

async function loadDeptSummary() {
  const { data: depts } = await db.from('departments').select('*').order('id');
  const { data: assets } = await db.from('assets').select('department, checked');
  const el = document.getElementById('dept-summary');
  if (!el) return;
  if (!depts || !depts.length) { el.innerHTML = '<div class="empty">부서를 먼저 등록해주세요</div>'; return; }
  el.innerHTML = depts.map(d => {
    const list = (assets||[]).filter(a => a.department === d.name);
    const total = list.length, done = list.filter(a=>a.checked).length;
    const pct = total ? Math.round(done/total*100) : 0;
    return `<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:14px;font-weight:500">${d.name}</span>
        <span class="badge ${pct===100?'badge-ok':'badge-no'}">${done}/${total} · ${pct}%</span>
      </div>
      <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

// ── 자산 관리 ─────────────────────────────────────
async function addAsset() {
  const id = document.getElementById('m-id').value.trim();
  const name = document.getElementById('m-name').value.trim();
  const loc = document.getElementById('m-loc').value.trim();
  const price = parseInt(document.getElementById('m-price').value) || 0;
  const dept = document.getElementById('m-dept-sel').value || document.getElementById('upload-dept-sel').value;
  const registered_at = document.getElementById('m-date').value || null;
  if (!id || !name) return alert('자산번호와 품목명을 입력하세요');
  const { error } = await db.from('assets').insert({ asset_id: id, name, location: loc, department: dept, price, registered_at, checked: false });
  if (error) { alert('오류: ' + (error.message||'중복된 자산번호일 수 있습니다')); return; }
  document.getElementById('m-id').value = '';
  document.getElementById('m-name').value = '';
  document.getElementById('m-loc').value = '';
  document.getElementById('m-price').value = '';
  document.getElementById('m-date').value = '';
  loadAssets();
}

async function removeAsset(id) {
  if (!confirm('이 자산을 삭제할까요?')) return;
  await db.from('assets').delete().eq('id', id);
  loadAssets();
}

async function loadAssets() {
  const filter = document.getElementById('asset-filter')?.value || '';
  let q = db.from('assets').select('*').order('id');
  if (filter) q = q.eq('department', filter);
  const { data } = await q;
  const el = document.getElementById('asset-list');
  if (!el) return;
  if (!data || !data.length) { el.innerHTML = '<div class="empty">등록된 자산이 없습니다</div>'; return; }
  el.innerHTML = data.map(a => `
    <div class="asset-item">
      <div class="asset-info">
        <div class="asset-id">${a.asset_id} · ${a.department}</div>
        <div class="asset-name">${a.name}</div>
        <div class="asset-loc">${a.location || '-'} · ${a.price ? a.price.toLocaleString()+'원' : '-'} · ${a.registered_at || '-'}</div>
      </div>
      <span class="badge ${a.checked?'badge-ok':'badge-no'}">${a.checked?'완료':'미확인'}</span>
      <button class="btn btn-danger" onclick="removeAsset(${a.id})">삭제</button>
    </div>`).join('');
}

async function uploadCSV(e) {
  const file = e.target.files[0]; if (!file) return;
  const defaultDept = document.getElementById('upload-dept-sel').value;
  const resEl = document.getElementById('upload-result');
  resEl.innerHTML = `<div style="font-size:13px;color:var(--text2);margin-top:8px">⏳ 업로드 중...</div>`;

  // EUC-KR / UTF-8 자동 감지
  let text = '';
  try {
    const bufArr = await file.arrayBuffer();
    // EUC-KR 시도
    try { text = new TextDecoder('euc-kr').decode(bufArr); }
    catch { text = new TextDecoder('utf-8').decode(bufArr); }
    // 깨진 경우 UTF-8로 재시도
    if (text.includes('â€') || text.includes('\uFFFD')) {
      text = new TextDecoder('utf-8').decode(bufArr);
    }
  } catch { text = await file.text(); }

  // CSV 파싱 (따옴표 안에 쉼표 처리)
  function parseCSVLine(line) {
    const result = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    result.push(cur.trim());
    return result;
  }

  const lines = text.split('\n').filter(l => l.trim());
  const rows = lines.slice(1).map(line => {
    const cols = parseCSVLine(line);
    // 금액: 쉼표, 공백, 원 제거
    const priceRaw = (cols[3] || '').replace(/[,\s원]/g, '');
    const price = parseInt(priceRaw) || 0;
    // 날짜: 2026.03.19 → 2026-03-19
    const dateRaw = (cols[5] || '').trim().replace(/\./g, '-');
    const registered_at = dateRaw || null;
    const dept = (cols[4] || '').trim() || defaultDept;
    return {
      asset_id: (cols[0] || '').trim(),
      name: (cols[1] || '').trim(),
      location: (cols[2] || '').trim(),
      price,
      department: dept,
      registered_at,
      checked: false
    };
  }).filter(r => r.asset_id && r.name);

  // 500개씩 나눠서 업로드 (대용량 처리)
  const chunkSize = 500;
  let total = 0;
  for (let i = 0; i < rows.length; i += chunkSize) {
    const chunk = rows.slice(i, i + chunkSize);
    const { error } = await db.from('assets').upsert(chunk, { onConflict: 'asset_id', ignoreDuplicates: true });
    if (!error) total += chunk.length;
  }

  resEl.innerHTML = `<div style="font-size:13px;color:var(--success);margin-top:8px">✅ ${total}개 업로드 완료 (전체 ${rows.length}개)</div>`;
  setTimeout(() => resEl.innerHTML = '', 5000);
  e.target.value = '';
  loadAssets();
}

// ── 현황 & 로그 ────────────────────────────────────
async function loadReport() {
  const { data } = await db.from('assets').select('checked');
  const total = data?.length || 0;
  const done = data?.filter(a=>a.checked).length || 0;
  const el = document.getElementById('report-stats');
  if (!el) return;
  el.innerHTML = `
    <div class="stat"><div class="stat-num">${total}</div><div class="stat-lbl">전체 자산</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--success)">${done}</div><div class="stat-lbl">조사 완료</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--danger)">${total-done}</div><div class="stat-lbl">미확인</div></div>`;
}

async function loadLog() {
  const { data } = await db.from('assets').select('*').eq('checked', true).order('checked_at', { ascending: false }).limit(50);
  const el = document.getElementById('log-list');
  if (!el) return;
  if (!data || !data.length) { el.innerHTML = '<div class="empty">아직 스캔된 자산이 없습니다</div>'; return; }
  el.innerHTML = data.map(a => `
    <div class="log-item">
      <div class="log-name">${a.name} <span style="font-size:12px;color:var(--text2)">[${a.asset_id}]</span></div>
      <div class="log-meta">
        ${a.department} · ${a.location||'-'} &nbsp;|&nbsp;
        <strong style="color:var(--accent)">${a.checked_by||'알 수 없음'}</strong> 조사 &nbsp;|&nbsp;
        ${a.checked_at ? new Date(a.checked_at).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '-'}
      </div>
    </div>`).join('');
}

// ── 조사원 ────────────────────────────────────────
async function loadSvDepts() {
  const { data: depts } = await db.from('departments').select('*').order('id');
  const { data: assets } = await db.from('assets').select('department,checked');
  const el = document.getElementById('sv-dept-grid');
  if (!el) return;
  if (!depts || !depts.length) { el.innerHTML = '<div class="empty">관리자가 부서를 등록하면 표시됩니다</div>'; return; }
  el.innerHTML = depts.map(d => {
    const list = (assets||[]).filter(a=>a.department===d.name);
    const total = list.length, done = list.filter(a=>a.checked).length;
    return `<div class="dept-card" onclick="selectDept('${d.name}')">
      <div class="dept-name">${d.name}</div>
      <div class="dept-stat">${done}/${total} 완료</div>
    </div>`;
  }).join('');
}

function selectDept(dept) {
  currentDept = dept;
  document.getElementById('sv-dept-sel').style.display = 'none';
  document.getElementById('sv-scan-main').style.display = 'block';
  document.getElementById('sv-dept-title').textContent = dept + ' 재물조사';
  updateProgress();
}

function backToDept() {
  stopScan();
  currentDept = null;
  document.getElementById('sv-dept-sel').style.display = 'block';
  document.getElementById('sv-scan-main').style.display = 'none';
  loadSvDepts();
}

async function updateProgress() {
  if (!currentDept) return;
  const { data } = await db.from('assets').select('checked').eq('department', currentDept);
  const total = data?.length || 0;
  const done = data?.filter(a=>a.checked).length || 0;
  const pct = total ? Math.round(done/total*100) : 0;
  const bar = document.getElementById('sv-prog-bar');
  const lbl = document.getElementById('sv-prog-label');
  if (bar) bar.style.width = pct + '%';
  if (lbl) lbl.textContent = `${done} / ${total} 확인 완료 (${pct}%)`;
}

async function checkAsset(assetId) {
  hideAlerts();
  if (!currentDept) return;
  const { data: rows } = await db.from('assets').select('*').eq('asset_id', assetId);
  if (!rows || !rows.length) { showAlert('fail', `자산번호 ${assetId} — 목록에 없는 자산입니다`); return; }
  const a = rows[0];
  if (a.department !== currentDept) { showAlert('fail', `${assetId} — 이 부서 소속이 아닙니다 (${a.department})`); return; }
  if (a.checked) { showAlert('warn', `${assetId} [${a.name}] — 이미 확인된 자산입니다`); return; }
  const now = new Date().toISOString();
  await db.from('assets').update({ checked: true, checked_by: currentUser.name, checked_at: now }).eq('id', a.id);
  showAlert('ok', `✅ ${assetId} [${a.name}] — 확인 완료!`);
  updateProgress();
  loadSvList('');
}

let scannerStream = null;
let scannerInterval = null;
let lastScanned = '';
let lastScannedTime = 0;

async function startScan() {
  if (!currentDept) return;
  document.getElementById('qr-start-area').style.display = 'none';
  document.getElementById('qr-scanner-wrap').style.display = 'block';
  hideAlerts();
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    scannerStream = stream;
    const video = document.getElementById('qr-video');
    video.srcObject = stream;
    video.setAttribute('playsinline', true);
    await video.play();
    scannerInterval = setInterval(() => scanFrame(video), 300);
  } catch(e) {
    showAlert('fail', '카메라 접근 권한이 필요합니다. 브라우저 설정에서 카메라를 허용해주세요.');
    stopScan();
  }
}

function stopScan() {
  if (scannerStream) { scannerStream.getTracks().forEach(t => t.stop()); scannerStream = null; }
  if (scannerInterval) { clearInterval(scannerInterval); scannerInterval = null; }
  document.getElementById('qr-start-area').style.display = 'block';
  document.getElementById('qr-scanner-wrap').style.display = 'none';
}

function scanFrame(video) {
  if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' });
  if (code) {
    const now = Date.now();
    if (code.data === lastScanned && now - lastScannedTime < 3000) return;
    lastScanned = code.data;
    lastScannedTime = now;
    const assetId = code.data.trim();
    checkAsset(assetId);
  }
}

async function loadSvList(q) {
  if (!currentDept) return;
  let query = db.from('assets').select('*').eq('department', currentDept).order('id');
  const { data } = await query;
  let list = data || [];
  if (q) list = list.filter(a => a.name.includes(q) || a.asset_id.includes(q));
  const el = document.getElementById('sv-list');
  if (!el) return;
  if (!list.length) { el.innerHTML = '<div class="empty">물품이 없습니다</div>'; return; }
  el.innerHTML = list.map(a => `
    <div class="asset-item" style="${a.checked?'opacity:.55':''}">
      <div class="asset-check">${a.checked ? '✅' : '⬜'}</div>
      <div class="asset-info">
        <div class="asset-id">${a.asset_id}</div>
        <div class="asset-name">${a.name}</div>
        <div class="asset-loc">${a.location||'-'} · ${a.price ? a.price.toLocaleString()+'원' : '-'} · ${a.registered_at||'-'}${a.checked_by ? ' · '+a.checked_by+' 조사' : ''}</div>
      </div>
      <span class="badge ${a.checked?'badge-ok':'badge-no'}">${a.checked?'완료':'미확인'}</span>
    </div>`).join('');
}

// ── 알림 ──────────────────────────────────────────
function hideAlerts() {
  ['alert-ok','alert-fail','alert-warn'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
}
function showAlert(type, msg) {
  hideAlerts();
  const el = document.getElementById('alert-'+type);
  if (!el) return;
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}
